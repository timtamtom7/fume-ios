name: Fume
options:
  bundleIdPrefix: com.fume
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_ENTITLEMENTS: ""
    SWIFT_VERSION: "6.0"

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    version: 0.15.3

targets:
  Fume:
    type: application
    platform: iOS
    sources:
      - Fume/Sources
      - Fume/Resources
    settings:
      base:
        INFOPLIST_FILE: Fume/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.fume.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ENABLE_PREVIEWS: "YES"
    dependencies:
      - package: SQLite
        product: SQLite
    entitlements:
      path: Fume/Resources/Fume.entitlements
      properties:
        com.apple.security.app-sandbox: true

  FumeWidget:
    type: app-extension
    platform: iOS
    sources:
      - FumeWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fume.app.widget
        INFOPLIST_FILE: FumeWidget/Info.plist
        SKIP_INSTALL: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
    entitlements:
      path: FumeWidget/FumeWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.fume.app
